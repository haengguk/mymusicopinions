
# ==========================================
# Server Configuration (Railway/Render automatically sets PORT)
# ==========================================
spring.profiles.default=local
server.port=${PORT:8080}
server.address=0.0.0.0
spring.jmx.enabled=false

# ==========================================
# Caching
# ==========================================
spring.thymeleaf.cache=false
spring.web.resources.cache.cachecontrol.max-age=0

# ==========================================
# Security & API Keys (Common)
# ==========================================
jwt.secret.key=${JWT_SECRET_KEY}
youtube.api.key=${YOUTUBE_API_KEY:}

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app,https://*.up.railway.app,http://localhost:3000,http://localhost:5173,http://localhost:5175}
